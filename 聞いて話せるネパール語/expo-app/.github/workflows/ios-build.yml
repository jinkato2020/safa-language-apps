name: Build iOS and Submit to TestFlight

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit to TestFlight after build?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Calculate build number
        run: |
          BUILD_NUMBER=$((100 + GITHUB_RUN_NUMBER))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "::notice::Build number: $BUILD_NUMBER"

      - name: Expo prebuild
        env:
          EXPO_NO_TELEMETRY: '1'
        run: npx expo prebuild --platform ios --clean

      - name: Detect Xcode project name
        run: |
          # .xcodeproj は prebuild 直後に存在する (.xcworkspace は pod install 後)
          XCODEPROJ=$(ls -d ios/*.xcodeproj 2>/dev/null | head -1)
          if [ -z "$XCODEPROJ" ]; then
            echo "::error::No .xcodeproj found in ios/ directory after prebuild"
            ls -la ios/ || true
            exit 1
          fi
          PROJECT_NAME=$(basename "$XCODEPROJ" .xcodeproj)
          if [ -z "$PROJECT_NAME" ]; then
            echo "::error::Could not extract project name from $XCODEPROJ"
            exit 1
          fi
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV
          echo "::notice::Detected project name: $PROJECT_NAME"

      - name: Set build number in Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "ios/$PROJECT_NAME/Info.plist"
          echo "::notice::Set CFBundleVersion to $BUILD_NUMBER"

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Setup signing keychain
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          # 末尾の改行/空白を除去（Secret に末尾改行が入っていることがある）
          CERT_PWD_CLEAN=$(printf '%s' "$CERT_PWD" | tr -d '\r\n[:space:]')

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "tempkeychain" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "tempkeychain" "$KEYCHAIN_PATH"

          printf '%s' "$CERT_B64" | base64 --decode > cert.p12

          # .p12 ファイルの中身が正しくデコードできたか確認
          if [ ! -s cert.p12 ]; then
            echo "::error::Decoded .p12 file is empty"
            exit 1
          fi
          echo "::notice::Decoded cert.p12 size: $(wc -c < cert.p12) bytes"

          security import cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PWD_CLEAN" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "tempkeychain" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          rm cert.p12

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode > profile.mobileprovision

          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -o - -)
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "::notice::Provisioning profile UUID: $PROFILE_UUID"

          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          rm profile.mobileprovision

      - name: Create ExportOptions.plist
        env:
          TEAM_ID_RAW: ${{ secrets.IOS_TEAM_ID }}
          BUNDLE_ID_RAW: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          TEAM_ID=$(printf '%s' "$TEAM_ID_RAW" | tr -d '\r\n[:space:]')
          BUNDLE_ID=$(printf '%s' "$BUNDLE_ID_RAW" | tr -d '\r\n[:space:]')
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build archive
        env:
          TEAM_ID_RAW: ${{ secrets.IOS_TEAM_ID }}
        run: |
          set -o pipefail
          TEAM_ID=$(printf '%s' "$TEAM_ID_RAW" | tr -d '\r\n[:space:]')
          cd ios
          xcodebuild \
            -workspace "${PROJECT_NAME}.xcworkspace" \
            -scheme "${PROJECT_NAME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Export IPA
        run: |
          set -o pipefail
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist ../ExportOptions.plist

          IPA_PATH=$(find build -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::IPA export failed"
            exit 1
          fi
          echo "::notice::IPA created: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: ios-ipa-build-${{ env.BUILD_NUMBER }}
          path: ios/build/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.submit != 'false' }}
        env:
          KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID_RAW: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KEY_ID=$(printf '%s' "$KEY_ID_RAW" | tr -d '\r\n[:space:]')
          ISSUER_ID=$(printf '%s' "$ISSUER_ID_RAW" | tr -d '\r\n[:space:]')

          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

          IPA_PATH=$(find ios/build -name "*.ipa" | head -1)
          echo "::notice::Uploading $IPA_PATH to TestFlight..."

          xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

          rm -rf ~/.appstoreconnect
