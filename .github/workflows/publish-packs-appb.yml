name: Publish App B packs to Release

# App B (聞いて話せる日本語) の言語パックを GitHub Release (tag: packs-appb) に公開する。
# 配信元を experiment/bangla ブランチの raw から Release 資産へ本番化するための仕組み。
#
# 発火:
#   - experiment/bangla の packs/** を push したとき (= パック更新で自動公開 / CI自動)
#   - このワークフローファイルを変更したとき (初回公開・手動更新用)
#   - 手動 (workflow_dispatch)
#
# 動作: experiment/bangla をチェックアウト → catalog の資産URLを Release のURLへ書換
#       → catalog + ne/bn の overlay/audio を Release(packs-appb) にアップロード。
# 配信URL: https://github.com/<repo>/releases/download/packs-appb/<file>

on:
  workflow_dispatch:
  push:
    branches: [main, experiment/bangla]
    paths:
      - 'packs/**'
      - '.github/workflows/publish-packs-appb.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout packs (experiment/bangla)
        uses: actions/checkout@v4
        with:
          ref: experiment/bangla

      - name: Rewrite catalog asset URLs to Release base
        run: |
          node -e "
          const fs=require('fs');
          const REL='https://github.com/${{ github.repository }}/releases/download/packs-appb';
          const c=JSON.parse(fs.readFileSync('packs/catalog.json','utf8'));
          for(const p of c.packs){
            if(p.url) p.url = REL + '/' + p.url.split('/').pop();
            if(p.audioZip) p.audioZip = REL + '/' + p.audioZip.split('/').pop();
          }
          fs.writeFileSync('packs/catalog.json', JSON.stringify(c,null,2));
          console.log('catalog rewritten to Release URLs');
          for(const p of c.packs) console.log('  '+p.l1+': '+p.url+' / '+(p.audioZip||'-'));
          "

      - name: Publish to Release (packs-appb)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # App B のパック資産 (catalog + ne/bn overlay + ne/bn audio。旧版も含めてアップロード)
          ASSETS=$(ls packs/catalog.json packs/overlay-ne-*.json packs/overlay-bn-*.json packs/audio-ne-*.zip packs/audio-bn-*.zip)
          echo "Uploading assets:"; echo "$ASSETS"
          # 既存 Release/タグを消して作り直す (資産URLは固定タグなので不変)
          gh release delete packs-appb --yes --cleanup-tag 2>/dev/null || true
          gh release create packs-appb $ASSETS \
            --title "App B language packs" \
            --notes "聞いて話せる日本語 の言語パック (ne/bn)。experiment/bangla から自動公開。" \
            --target main \
            --latest=false
