name: App Store prepare / submit (manual)

# =============================================================================
# 手動専用。ビルドWF (Build iOS) で TestFlight に上げたビルドを App Store の
# バージョンに紐付け、(任意で) 審査に提出する。
#
# ■ mode (デフォルト: prepare)
#   prepare … 今回コミットのビルドをバージョンに紐付けるところまで実行し、
#             「審査には提出しない」。最後の「審査に提出」は App Store Connect で
#             手動で押す運用。← 通常はこちら。
#   submit  … 紐付け＋審査提出＋通過後の自動公開まで一気に実行 (従来動作)。
#
# ■ ビルド番号
#   ビルドWFと同じ計算式 BUILD_NUMBER = 1000 + commit総数 で、今回コミットの
#   ビルドを --build_number で明示指定する。古いビルドの誤紐付けを防ぐ。
#   (そのビルドが未処理ならリトライで待つ)
#
# ■ 使い方
#   GitHub → Actions → "App Store prepare / submit (manual)" → Run workflow →
#   app (nepali / japanese / both) と mode (prepare / submit) を選んで実行。
#
# ■ 前提条件
#   1. 先にビルドWFでビルド→TestFlightアップロード済みであること。
#   2. app.json の expo.version が「まだ公開していない新バージョン」であること。
#   3. submit する場合、App Store Connect 側にそのバージョンの必須メタデータ
#      (特に「このバージョンの新機能」) が入っていること (skip_metadata=true のため)。
#
# ■ 必要 Secrets (ビルドWFと共通)
#   APP_STORE_CONNECT_KEY_ID / APP_STORE_CONNECT_ISSUER_ID / APP_STORE_CONNECT_API_KEY_BASE64
#   IOS_BUNDLE_ID (Nepali) / IOS_BUNDLE_ID_JAPANESE (Japanese)
#
# ■ 注意
#   アップロード直後はビルドが「処理中」で紐付け/提出できないため、deliver を
#   最大6回 (約30分) リトライする。処理完了済みなら1回目で成功する。
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app?'
        required: true
        default: 'nepali'
        type: choice
        options:
          - 'nepali'
          - 'japanese'
          - 'english'
          - 'both'
          - 'all'
      mode:
        description: 'prepare = 紐付けのみ(手動提出) / submit = 提出+自動公開まで'
        required: true
        default: 'prepare'
        type: choice
        options:
          - 'prepare'
          - 'submit'
      build_number:
        description: 'ビルド番号の明示指定(空ならコミット数から自動計算)。ビルドWF後にコミットした場合はずれるので明示推奨。'
        required: false
        default: ''
        type: string

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  submit-nepali:
    if: ${{ github.event.inputs.app == 'nepali' || github.event.inputs.app == 'both' || github.event.inputs.app == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_DIR: 聞いて話せるネパール語/expo-app
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Prepare / submit to App Store
        working-directory: ${{ env.APP_DIR }}
        env:
          KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID_RAW: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          BUNDLE_ID_RAW: ${{ secrets.IOS_BUNDLE_ID }}
          MODE: ${{ github.event.inputs.mode }}
          BUILD_NUMBER_OVERRIDE: ${{ github.event.inputs.build_number }}
        run: |
          set -e
          KEY_ID=$(printf '%s' "$KEY_ID_RAW" | tr -d '\r\n[:space:]')
          ISSUER_ID=$(printf '%s' "$ISSUER_ID_RAW" | tr -d '\r\n[:space:]')
          BUNDLE_ID=$(printf '%s' "$BUNDLE_ID_RAW" | tr -d '\r\n[:space:]')
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ -n "$BUILD_NUMBER_OVERRIDE" ]; then BUILD_NUMBER="$BUILD_NUMBER_OVERRIDE"; else BUILD_NUMBER=$((1000 + $(git rev-list --count HEAD))); fi
          if [ "$MODE" = "submit" ]; then SUBMIT=true; else SUBMIT=false; fi
          echo "::notice::App Store $MODE: $BUNDLE_ID v$APP_VERSION build $BUILD_NUMBER (submit_for_review=$SUBMIT)"

          # App Store Connect API キー JSON を生成 (fastlane deliver 用)
          printf '%s' "$KEY_B64" | base64 --decode > /tmp/AuthKey.p8
          node -e "const fs=require('fs');const key=fs.readFileSync('/tmp/AuthKey.p8','utf8');fs.writeFileSync('/tmp/asc.json',JSON.stringify({key_id:'$KEY_ID',issuer_id:'$ISSUER_ID',key,in_house:false}));"

          # ビルド処理待ち: 紐付け/提出できるまで最大6回 (約30分) リトライ
          # deliver は設定が無いと「setup する?」と対話プロンプトを出しCIで落ちる。
          # 最小 Deliverfile を置いて回避(メタデータ/スクショは skip 指定で触らない)。
          mkdir -p fastlane
          [ -f fastlane/Deliverfile ] || printf '# CI minimal Deliverfile (metadata/screenshots skipped)\n' > fastlane/Deliverfile
          n=0
          until fastlane deliver \
              --api_key_path /tmp/asc.json \
              --app_identifier "$BUNDLE_ID" \
              --app_version "$APP_VERSION" \
              --build_number "$BUILD_NUMBER" \
              --submit_for_review $SUBMIT \
              --automatic_release $SUBMIT \
              --force true \
              --skip_binary_upload true \
              --skip_metadata true \
              --skip_screenshots true \
              --run_precheck_before_submit false \
              --precheck_include_in_app_purchases false ; do
            n=$((n+1))
            if [ "$n" -ge 6 ]; then
              echo "::error::deliver がリトライ上限に達しました。ビルド未処理 / バージョン重複 / メタデータ不足の可能性。"
              exit 1
            fi
            echo "::notice::ビルド処理待ちか一時エラー。5分後に再試行 ($n/6)..."
            sleep 300
          done

          if [ "$SUBMIT" = "true" ]; then
            echo "::notice::審査に提出しました (通過後 自動公開)。"
          else
            echo "::notice::ビルド $BUILD_NUMBER をバージョンに紐付けました。App Store Connect で内容を確認し『審査に提出』を押してください。"
          fi

          rm -f /tmp/AuthKey.p8 /tmp/asc.json

  # ─────────────────────────────────────────────────────────────────────────
  submit-japanese:
    if: ${{ github.event.inputs.app == 'japanese' || github.event.inputs.app == 'both' || github.event.inputs.app == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_DIR: 聞いて話せる日本語/expo-app
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Prepare / submit to App Store
        working-directory: ${{ env.APP_DIR }}
        env:
          KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID_RAW: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          BUNDLE_ID_RAW: ${{ secrets.IOS_BUNDLE_ID_JAPANESE }}
          MODE: ${{ github.event.inputs.mode }}
          BUILD_NUMBER_OVERRIDE: ${{ github.event.inputs.build_number }}
        run: |
          set -e
          KEY_ID=$(printf '%s' "$KEY_ID_RAW" | tr -d '\r\n[:space:]')
          ISSUER_ID=$(printf '%s' "$ISSUER_ID_RAW" | tr -d '\r\n[:space:]')
          BUNDLE_ID=$(printf '%s' "$BUNDLE_ID_RAW" | tr -d '\r\n[:space:]')
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ -n "$BUILD_NUMBER_OVERRIDE" ]; then BUILD_NUMBER="$BUILD_NUMBER_OVERRIDE"; else BUILD_NUMBER=$((1000 + $(git rev-list --count HEAD))); fi
          if [ "$MODE" = "submit" ]; then SUBMIT=true; else SUBMIT=false; fi
          echo "::notice::App Store $MODE: $BUNDLE_ID v$APP_VERSION build $BUILD_NUMBER (submit_for_review=$SUBMIT)"

          printf '%s' "$KEY_B64" | base64 --decode > /tmp/AuthKey.p8
          node -e "const fs=require('fs');const key=fs.readFileSync('/tmp/AuthKey.p8','utf8');fs.writeFileSync('/tmp/asc.json',JSON.stringify({key_id:'$KEY_ID',issuer_id:'$ISSUER_ID',key,in_house:false}));"

          # deliver は設定が無いと「setup する?」と対話プロンプトを出しCIで落ちる。
          # 最小 Deliverfile を置いて回避(メタデータ/スクショは skip 指定で触らない)。
          mkdir -p fastlane
          [ -f fastlane/Deliverfile ] || printf '# CI minimal Deliverfile (metadata/screenshots skipped)\n' > fastlane/Deliverfile
          n=0
          until fastlane deliver \
              --api_key_path /tmp/asc.json \
              --app_identifier "$BUNDLE_ID" \
              --app_version "$APP_VERSION" \
              --build_number "$BUILD_NUMBER" \
              --submit_for_review $SUBMIT \
              --automatic_release $SUBMIT \
              --force true \
              --skip_binary_upload true \
              --skip_metadata true \
              --skip_screenshots true \
              --run_precheck_before_submit false \
              --precheck_include_in_app_purchases false ; do
            n=$((n+1))
            if [ "$n" -ge 6 ]; then
              echo "::error::deliver がリトライ上限に達しました。ビルド未処理 / バージョン重複 / メタデータ不足の可能性。"
              exit 1
            fi
            echo "::notice::ビルド処理待ちか一時エラー。5分後に再試行 ($n/6)..."
            sleep 300
          done

          if [ "$SUBMIT" = "true" ]; then
            echo "::notice::審査に提出しました (通過後 自動公開)。"
          else
            echo "::notice::ビルド $BUILD_NUMBER をバージョンに紐付けました。App Store Connect で内容を確認し『審査に提出』を押してください。"
          fi

          rm -f /tmp/AuthKey.p8 /tmp/asc.json

  # ─────────────────────────────────────────────────────────────────────────
  submit-english:
    if: ${{ github.event.inputs.app == 'english' || github.event.inputs.app == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_DIR: 聞いて話せる英語/expo-app
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Prepare / submit to App Store
        working-directory: ${{ env.APP_DIR }}
        env:
          KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID_RAW: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          MODE: ${{ github.event.inputs.mode }}
          BUILD_NUMBER_OVERRIDE: ${{ github.event.inputs.build_number }}
        run: |
          set -e
          KEY_ID=$(printf '%s' "$KEY_ID_RAW" | tr -d '\r\n[:space:]')
          ISSUER_ID=$(printf '%s' "$ISSUER_ID_RAW" | tr -d '\r\n[:space:]')
          BUNDLE_ID="com.safa.english"
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ -n "$BUILD_NUMBER_OVERRIDE" ]; then BUILD_NUMBER="$BUILD_NUMBER_OVERRIDE"; else BUILD_NUMBER=$((1000 + $(git rev-list --count HEAD))); fi
          if [ "$MODE" = "submit" ]; then SUBMIT=true; else SUBMIT=false; fi
          echo "::notice::App Store $MODE: $BUNDLE_ID v$APP_VERSION build $BUILD_NUMBER (submit_for_review=$SUBMIT)"

          printf '%s' "$KEY_B64" | base64 --decode > /tmp/AuthKey.p8
          node -e "const fs=require('fs');const key=fs.readFileSync('/tmp/AuthKey.p8','utf8');fs.writeFileSync('/tmp/asc.json',JSON.stringify({key_id:'$KEY_ID',issuer_id:'$ISSUER_ID',key,in_house:false}));"

          # deliver は設定が無いと「setup する?」と対話プロンプトを出しCIで落ちる。
          # 最小 Deliverfile を置いて回避(メタデータ/スクショは skip 指定で触らない)。
          mkdir -p fastlane
          [ -f fastlane/Deliverfile ] || printf '# CI minimal Deliverfile (metadata/screenshots skipped)\n' > fastlane/Deliverfile
          n=0
          until fastlane deliver \
              --api_key_path /tmp/asc.json \
              --app_identifier "$BUNDLE_ID" \
              --app_version "$APP_VERSION" \
              --build_number "$BUILD_NUMBER" \
              --submit_for_review $SUBMIT \
              --automatic_release $SUBMIT \
              --force true \
              --skip_binary_upload true \
              --skip_metadata true \
              --skip_screenshots true \
              --run_precheck_before_submit false \
              --precheck_include_in_app_purchases false ; do
            n=$((n+1))
            if [ "$n" -ge 6 ]; then
              echo "::error::deliver がリトライ上限に達しました。ビルド未処理 / バージョン重複 / メタデータ不足の可能性。"
              exit 1
            fi
            echo "::notice::ビルド処理待ちか一時エラー。5分後に再試行 ($n/6)..."
            sleep 300
          done

          if [ "$SUBMIT" = "true" ]; then
            echo "::notice::審査に提出しました (通過後 自動公開)。"
          else
            echo "::notice::ビルド $BUILD_NUMBER をバージョンに紐付けました。App Store Connect で内容を確認し『審査に提出』を押してください。"
          fi

          rm -f /tmp/AuthKey.p8 /tmp/asc.json
