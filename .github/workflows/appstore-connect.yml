name: App Store Connect 状態取得 (手動)
run-name: "ASC: ${{ inputs.operation }} / app=${{ inputs.app }}"

# App Store Connect API(JWT認証)で版・審査状態・ビルド処理状態を取得する管理用ワークフロー。
# 鍵はローカルに置かず、ここ(CI)で Secret から復元して使う。
# Secrets: APP_STORE_CONNECT_KEY_ID / APP_STORE_CONNECT_ISSUER_ID / APP_STORE_CONNECT_API_KEY_BASE64

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 実行する操作
        type: choice
        required: true
        default: status
        options:
          - status            # 版(審査状態) + 最新ビルド(処理状態)
          - builds            # 最新ビルド一覧(処理状態/期限)
          - set-release-manual    # 公開前バージョンのリリース方法を「手動」に変更
          - set-release-auto      # 公開前バージョンのリリース方法を「承認後自動公開」に変更
          - release               # 承認済(PENDING_DEVELOPER_RELEASE)を手動リリース=公開
          - set-privacy-url   # App情報の プライバシーポリシーURL を設定(value=URL)
          - add-tester        # TestFlightテスター追加(value=email・内部優先)
          - metadata-inspect  # App B のバージョン/ローカライズ現状を表示(読取専用)
          - metadata-apply    # App B のメタデータ(名前/サブ/説明/KW/プロモ)をen/ja/zh/viに投入
      app:
        description: 対象アプリ (A=ネパール語 / B=日本語 / C=英語 / J=まいにちJLPT / ALL)
        type: choice
        required: true
        default: ALL
        options: [A, B, C, J, ALL]
      value:
        description: "set-privacy-url 用の値（プライバシーポリシーURL）"
        type: string
        required: false
        default: ""

jobs:
  asc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet "pyjwt[crypto]" requests

      - name: Decode ASC API key
        env:
          KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KEY_ID=$(printf '%s' "$KEY_ID_RAW" | tr -d '\r\n[:space:]')
          mkdir -p /tmp/asc
          printf '%s' "$KEY_B64" | base64 --decode > "/tmp/asc/AuthKey_${KEY_ID}.p8"
          if [ ! -s "/tmp/asc/AuthKey_${KEY_ID}.p8" ]; then echo "::error::ASC鍵が空です"; exit 1; fi
          echo "ASC_KEY_PATH=/tmp/asc/AuthKey_${KEY_ID}.p8" >> $GITHUB_ENV
          echo "ASC_KEY_ID=$KEY_ID" >> $GITHUB_ENV

      - name: Run
        env:
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          OP: ${{ inputs.operation }}
          APP: ${{ inputs.app }}
          VALUE: ${{ inputs.value }}
        run: |
          case "$OP" in
            status|builds)       python scripts/asc_status.py "$OP" --app "$APP" | tee -a "$GITHUB_STEP_SUMMARY" ;;
            set-release-manual)  python scripts/asc_status.py set-release-type --app "$APP" --release-type MANUAL | tee -a "$GITHUB_STEP_SUMMARY" ;;
            set-release-auto)    python scripts/asc_status.py set-release-type --app "$APP" --release-type AFTER_APPROVAL | tee -a "$GITHUB_STEP_SUMMARY" ;;
            release)             python scripts/asc_status.py release --app "$APP" | tee -a "$GITHUB_STEP_SUMMARY" ;;
            set-privacy-url)     python scripts/asc_status.py set-privacy-url --app "$APP" --url "$VALUE" | tee -a "$GITHUB_STEP_SUMMARY" ;;
            add-tester)          python scripts/asc_status.py add-tester --app "$APP" --email "$VALUE" | tee -a "$GITHUB_STEP_SUMMARY" ;;
            metadata-inspect)    python scripts/asc_metadata.py inspect | tee -a "$GITHUB_STEP_SUMMARY" ;;
            metadata-apply)      python scripts/asc_metadata.py apply 1.3.0 | tee -a "$GITHUB_STEP_SUMMARY" ;;
            *) echo "::error::unknown op $OP"; exit 1 ;;
          esac

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/asc
