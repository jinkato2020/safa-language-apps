name: Publish App A packs v2 (音源マスター→32k→Release)

# 手動専用。Git管理の音源マスター 聞いて話せるネパール語/audio/<lang>/{conv,gram} を
# 唯一の正として、32k化→STORED zip→Release packs-appa-v2 に公開する。
# scripts/build_appa_packs_32k.py を --publish で実行(catalog更新+audioVersion+1+upload)。
# これで「マスター編集→ワンクリックでパック再公開」が再現可能になる(手作業の食い違い解消)。

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true=ビルドのみ(公開しない) / false=公開まで'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build (+publish) packs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SCRIPT="聞いて話せるネパール語/scripts/build_appa_packs_32k.py"
          if [ "${{ github.event.inputs.dry_run }}" = "false" ]; then
            python "$SCRIPT" --publish | tee -a "$GITHUB_STEP_SUMMARY"
          else
            python "$SCRIPT" | tee -a "$GITHUB_STEP_SUMMARY"
            echo "::notice::dry_run=true のためビルドのみ(公開なし)。公開は dry_run=false で再実行。"
          fi
