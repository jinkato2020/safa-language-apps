name: App Store media upload (screenshots / App Preview)

# =============================================================================
# 手動専用。App Store のスクショ + App Preview 動画だけを差し替える。
# バイナリ(--skip_binary_upload)とメタデータ(--skip_metadata)には一切触れない。
#
# ■ アセット
#   聞いて話せる日本語/store/appstore/<lang>/<device>/*.png  (スクショ)
#   聞いて話せる日本語/store/appstore/_video/*.mp4           (App Preview, 886x1920)
#   デバイスは画像解像度で deliver が自動判別(1242x2688=iPhone6.5 / 2064x2752=iPad13)。
#   動画 886x1920 は iPhone 6.5" の App Preview として自動認識。
#
# ■ ロケール
#   入力 locales(カンマ区切り, 既定 "ja,en-US")。
#   App Store のストア言語にしか上げられない(ベンガル語 bn / ネパール語 ne は非対応)。
#   対応: ja->ja / en-US->en / vi->vi / zh-Hans->zh。
#   ※指定ロケールが App Store Connect 側に未作成だと deliver が失敗する。
#     既定の ja,en-US は通常存在。vi,zh-Hans は存在を確認してから足すこと。
#
# ■ 注意
#   --overwrite_screenshots true なので、対象ロケールの既存スクショは
#   ここで指定した一式に「置き換わる」。用意済みの完全な一式を上げる前提。
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app? (現状 japanese のみ対応)'
        required: true
        default: 'japanese'
        type: choice
        options:
          - 'japanese'
      locales:
        description: 'アップ対象ロケール(カンマ区切り)。既定 ja,en-US。vi,zh-Hans は存在確認後に追加。'
        required: true
        default: 'ja,en-US'
        type: string
      reject_first:
        description: 'true=対象バージョンが審査中なら先に審査を取り下げて編集可能にしてからアップ(提出後ロック対策)。アップ後は別途 submit が必要。'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      set_release_notes:
        description: 'true=「このバージョンの新機能」を全ロケールに投入(ポスター母語表示/枠位置修正)。他メタは不変。'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      set_promo_text:
        description: 'true=「プロモーション用テキスト」を全ロケールに投入(審査不要フィールド)。他メタは不変。'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_screenshots:
        description: 'true=スクショは触らずメタデータ(リリースノート/プロモ)のみ更新。'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  media-japanese:
    if: ${{ github.event.inputs.app == 'japanese' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_DIR: 聞いて話せる日本語/expo-app
      ASSET_DIR: 聞いて話せる日本語/store/appstore
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Upload screenshots / App Preview
        working-directory: ${{ env.APP_DIR }}
        env:
          KEY_ID_RAW: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID_RAW: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          BUNDLE_ID_RAW: ${{ secrets.IOS_BUNDLE_ID_JAPANESE }}
          LOCALES: ${{ github.event.inputs.locales }}
          REJECT_FIRST: ${{ github.event.inputs.reject_first }}
          SET_RN: ${{ github.event.inputs.set_release_notes }}
          SET_PROMO: ${{ github.event.inputs.set_promo_text }}
          SKIP_SS: ${{ github.event.inputs.skip_screenshots }}
        run: |
          set -e
          KEY_ID=$(printf '%s' "$KEY_ID_RAW" | tr -d '\r\n[:space:]')
          ISSUER_ID=$(printf '%s' "$ISSUER_ID_RAW" | tr -d '\r\n[:space:]')
          BUNDLE_ID=$(printf '%s' "$BUNDLE_ID_RAW" | tr -d '\r\n[:space:]')
          export BUNDLE_ID
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          export APP_VERSION
          echo "::notice::App Store media: $BUNDLE_ID v$APP_VERSION locales=[$LOCALES] reject_first=$REJECT_FIRST"

          printf '%s' "$KEY_B64" | base64 --decode > /tmp/AuthKey.p8
          node -e "const fs=require('fs');const key=fs.readFileSync('/tmp/AuthKey.p8','utf8');fs.writeFileSync('/tmp/asc.json',JSON.stringify({key_id:'$KEY_ID',issuer_id:'$ISSUER_ID',key,in_house:false}));"

          # 審査中バージョンの取り下げ(編集ロック解除)。提出後はスクショ削除/差し替えができないため。
          if [ "$REJECT_FIRST" = "true" ]; then
            echo "::notice::reject_first: $APP_VERSION が審査中なら取り下げます…"
            ruby -e '
              require "spaceship"
              Spaceship::ConnectAPI.token = Spaceship::ConnectAPI::Token.from_json_file("/tmp/asc.json")
              app = Spaceship::ConnectAPI::App.find(ENV["BUNDLE_ID"])
              abort("app not found: #{ENV["BUNDLE_ID"]}") unless app
              plat = Spaceship::ConnectAPI::Platform::IOS
              cands = []
              cands << (app.get_edit_app_store_version(platform: plat) rescue nil)
              cands << (app.get_in_review_app_store_version(platform: plat) rescue nil)
              begin
                cands.concat(app.get_app_store_versions(filter: { platform: "IOS", versionString: ENV["APP_VERSION"] }, includes: "appStoreVersionSubmission"))
              rescue => e
                puts "list versions failed: #{e.message}"
              end
              seen = {}; done = false
              cands.compact.each do |v|
                next if seen[v.id]; seen[v.id] = true
                puts "version #{v.version_string} state=#{v.app_store_state} id=#{v.id}"
                begin
                  sub = (v.app_store_version_submission rescue nil)
                  sub ||= (v.fetch_app_store_version_submission rescue nil)
                  if sub
                    sub.delete!
                    puts "=> removed from review: #{v.version_string}"
                    done = true
                  else
                    puts "   no active submission"
                  end
                rescue => e
                  puts "   submission delete failed: #{e.class} #{e.message}"
                end
              end
              puts(done ? "REJECT_OK" : "REJECT_NONE")
            '
            echo "::notice::取り下げ反映待ち 30s…"; sleep 30
          fi

          # deliver の対話プロンプト回避(メタデータ/バイナリは skip 指定で触らない)
          mkdir -p fastlane
          [ -f fastlane/Deliverfile ] || printf '# CI minimal Deliverfile\n' > fastlane/Deliverfile

          # ロケール -> アセット言語フォルダ の対応
          src_lang() {
            case "$1" in
              ja)      echo ja ;;
              en-US)   echo en ;;
              vi)      echo vi ;;
              zh-Hans) echo zh ;;
              *)       echo "" ;;
            esac
          }

          # スクショ配置(SKIP_SS=true ならメタデータのみ更新でスキップ)
          if [ "$SKIP_SS" != "true" ]; then
            ASSET_ROOT="../store/appstore"
            VIDEO=$(ls "$ASSET_ROOT"/_video/*.mp4 2>/dev/null | head -n1 || true)
            rm -rf fastlane/screenshots && mkdir -p fastlane/screenshots
            IFS=',' read -ra LOCS <<< "$LOCALES"
            for raw in "${LOCS[@]}"; do
              loc=$(printf '%s' "$raw" | tr -d '[:space:]')
              [ -n "$loc" ] || continue
              lang=$(src_lang "$loc")
              if [ -z "$lang" ] || [ ! -d "$ASSET_ROOT/$lang" ]; then
                echo "::warning::locale $loc にアセットが無い(lang=$lang)。スキップ。"
                continue
              fi
              dest="fastlane/screenshots/$loc"
              mkdir -p "$dest"
              # device サブフォルダごとに、解像度判別のためファイル名にデバイス名を前置して flat 配置
              for dev in "$ASSET_ROOT/$lang"/*/; do
                devname=$(basename "$dev")
                for f in "$dev"*.png; do
                  [ -e "$f" ] || continue
                  cp "$f" "$dest/${devname}_$(basename "$f")"
                done
              done
              # App Preview 動画(言語非依存)を各ロケールへ
              [ -n "$VIDEO" ] && cp "$VIDEO" "$dest/"
              echo "::notice::$loc: $(ls "$dest" | wc -l) files staged (lang=$lang)"
            done
            if [ -z "$(ls -A fastlane/screenshots 2>/dev/null)" ]; then
              echo "::error::アップ対象のロケールが1つも整いませんでした。"
              exit 1
            fi
          fi

          # メタデータ更新(release_notes / promotional_text)。現行メタデータを取得→該当ファイル
          #  だけ差し替え→skip_metadata=false で他フィールドは現状維持。どちらも審査不要で反映可。
          SKIP_META=true
          if [ "$SET_RN" = "true" ] || [ "$SET_PROMO" = "true" ]; then
            SKIP_META=false
            fastlane deliver download_metadata --api_key_path /tmp/asc.json --app_identifier "$BUNDLE_ID" --skip_screenshots true --force true || true
            for d in fastlane/metadata/*/; do
              [ -d "$d" ] || continue
              loc=$(basename "$d")
              if [ "$SET_RN" = "true" ]; then
                case "$loc" in
                  ja*)      printf '%s\n%s\n%s\n' "聞き流し(ポスター)モードのテーマ名を母語で表示するようにしました。" "ポスターの拡大枠の位置を修正しました。" "その他の軽微な改善と不具合修正。" > "${d}release_notes.txt" ;;
                  vi*)      printf '%s\n%s\n%s\n' "Chế độ Poster (nghe) giờ hiển thị tên chủ đề bằng ngôn ngữ của bạn." "Đã sửa vị trí khung phóng to của poster." "Cải thiện nhỏ và sửa lỗi." > "${d}release_notes.txt" ;;
                  zh-Hans*) printf '%s\n%s\n%s\n' "海报(磨耳朵)模式现在以您的母语显示主题名称。" "修正了海报放大框的位置。" "其他细微改进和问题修复。" > "${d}release_notes.txt" ;;
                  *)        printf '%s\n%s\n%s\n' "Poster (listening) mode now shows theme titles in your language." "Fixed the position of the poster zoom frame." "Other minor improvements and bug fixes." > "${d}release_notes.txt" ;;
                esac
              fi
              if [ "$SET_PROMO" = "true" ]; then
                case "$loc" in
                  ja*)      printf '%s\n%s\n' "毎日少しずつ聞いて表現を感覚で身につける。文章作文で話す力も鍛えましょう。" "英語・中国語・ベトナム語・ネパール語・ベンガル語に対応。" > "${d}promotional_text.txt" ;;
                  vi*)      printf '%s\n%s\n' "Mỗi ngày nghe một chút để cảm nhận và ghi nhớ cách diễn đạt một cách tự nhiên; rèn khả năng nói qua việc đặt câu." "Hỗ trợ tiếng Anh, tiếng Trung, tiếng Việt, tiếng Nepal và tiếng Bengal." > "${d}promotional_text.txt" ;;
                  zh-Hans*) printf '%s\n%s\n' "每天听一点，凭语感自然掌握表达；通过造句练习，同时锻炼口语表达能力。" "支持英语、汉语、越南语、尼泊尔语、孟加拉语。" > "${d}promotional_text.txt" ;;
                  *)        printf '%s\n%s\n' "Listen a little each day to absorb expressions naturally, and build your speaking skills by composing your own sentences." "Available in English, Chinese, Vietnamese, Nepali and Bengali." > "${d}promotional_text.txt" ;;
                esac
              fi
            done
            echo "::notice::metadata set (RN=$SET_RN PROMO=$SET_PROMO) for: $(ls fastlane/metadata 2>/dev/null | tr '\n' ' ')"
          fi

          fastlane deliver \
            --api_key_path /tmp/asc.json \
            --app_identifier "$BUNDLE_ID" \
            --app_version "$APP_VERSION" \
            --screenshots_path fastlane/screenshots \
            --skip_binary_upload true \
            --skip_metadata "$SKIP_META" \
            --skip_screenshots "$SKIP_SS" \
            --overwrite_screenshots true \
            --sync_screenshots false \
            --run_precheck_before_submit false \
            --force true

          echo "::notice::更新しました(SS=$([ "$SKIP_SS" = "true" ] && echo skip || echo yes) RN=$SET_RN PROMO=$SET_PROMO・審査提出なし)。App Store Connect で確認してください。"
          rm -f /tmp/AuthKey.p8 /tmp/asc.json
